<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Furniture AR — Place in Your Room</title>
<style>
  :root{
    --ink:#14110d; --bone:#f3efe6; --sand:#e4dccb;
    --brass:#b8893f; --brass-soft:#cda35e;
    --line:rgba(20,17,13,0.12);
    --shadow:0 18px 50px -18px rgba(20,17,13,0.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Spectral','Georgia',serif;
    background:radial-gradient(120% 80% at 50% -10%, #fbf8f1 0%, var(--bone) 55%, var(--sand) 100%);
    color:var(--ink); overflow:hidden; position:fixed; inset:0; width:100%;
  }
  .util{font-family:'Inter','Helvetica Neue',sans-serif;}

  #landing{position:absolute;inset:0;display:flex;flex-direction:column;
    padding:28px 24px calc(28px + env(safe-area-inset-bottom));z-index:5;}
  .eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.32em;
    text-transform:uppercase;color:var(--brass);font-weight:600;}
  .topline{display:flex;justify-content:space-between;align-items:baseline;}
  .topline .meta{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.18em;
    text-transform:uppercase;color:rgba(20,17,13,0.4);}

  .stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;margin:8px -24px;}
  #preview{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .stage-fade{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(60% 50% at 50% 60%, transparent 60%, rgba(228,220,203,0.5) 100%);}

  .titleblock{padding-top:4px;}
  .titleblock h1{font-weight:500;font-size:38px;line-height:0.98;letter-spacing:-0.01em;}
  .titleblock h1 em{font-style:italic;color:var(--brass);}
  .dims{font-family:'Inter',sans-serif;font-size:12px;letter-spacing:0.04em;
    color:rgba(20,17,13,0.55);margin-top:12px;display:flex;gap:18px;align-items:center;}
  .dims b{font-weight:600;color:var(--ink);}
  .dims .sep{width:1px;height:11px;background:var(--line);}

  .enter{margin-top:22px;width:100%;border:none;background:var(--ink);color:var(--bone);
    font-family:'Inter',sans-serif;font-weight:600;font-size:14px;letter-spacing:0.14em;
    text-transform:uppercase;padding:19px;border-radius:2px;display:flex;align-items:center;
    justify-content:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .12s ease, background .2s ease;}
  .enter:active{transform:scale(.985);background:#221d16;}
  .enter svg{width:18px;height:18px;}

  .hint{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.03em;
    color:rgba(20,17,13,0.4);text-align:center;margin-top:12px;line-height:1.5;}
  .hint a{color:var(--brass);text-decoration:none;border-bottom:1px solid var(--brass-soft);}

  #previewLoad{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    gap:10px;pointer-events:none;transition:opacity .5s ease;}
  #previewLoad.gone{opacity:0;}
  .ring{width:26px;height:26px;border-radius:50%;border:2px solid rgba(20,17,13,0.12);
    border-top-color:var(--brass);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #previewLoad span{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:rgba(20,17,13,0.4);}

  #ar-overlay{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;
    justify-content:space-between;
    padding:calc(20px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));
    pointer-events:none;}
  #ar-overlay.on{display:flex;}
  .ar-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .readout{pointer-events:none;background:rgba(20,17,13,0.55);backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);border:1px solid rgba(243,239,230,0.16);
    border-radius:3px;padding:12px 14px;color:var(--bone);min-width:148px;}
  .readout .rk{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--brass-soft);}
  .readout .rv{font-family:'Inter',sans-serif;font-weight:600;font-size:19px;letter-spacing:.01em;
    margin-top:3px;font-variant-numeric:tabular-nums;}
  .readout .rv small{font-size:12px;font-weight:400;opacity:.7;margin-left:2px;}
  .readout .rsub{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.05em;
    color:rgba(243,239,230,0.55);margin-top:8px;font-variant-numeric:tabular-nums;}
  .close{pointer-events:auto;width:42px;height:42px;border-radius:50%;background:rgba(20,17,13,0.55);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(243,239,230,0.16);
    color:var(--bone);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .close svg{width:18px;height:18px;}
  .ar-bottom{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .reticle-hint{pointer-events:none;font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.04em;
    color:var(--bone);background:rgba(20,17,13,0.5);backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);padding:10px 16px;border-radius:100px;text-align:center;
    transition:opacity .4s ease;}
  .place-btn{pointer-events:auto;border:none;background:var(--brass);color:#1b1306;
    font-family:'Inter',sans-serif;font-weight:700;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;padding:16px 32px;border-radius:100px;display:flex;align-items:center;
    gap:10px;cursor:pointer;box-shadow:0 10px 30px -8px rgba(0,0,0,0.6);transition:transform .12s ease;}
  .place-btn:active{transform:scale(.96);}
  .place-btn.hidden{display:none;}

  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:40;background:var(--bone);
    border-top:1px solid var(--line);border-radius:14px 14px 0 0;
    padding:26px 24px calc(30px + env(safe-area-inset-bottom));transform:translateY(110%);
    transition:transform .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 -20px 50px -20px rgba(20,17,13,.4);}
  #sheet.up{transform:translateY(0);}
  #sheet h3{font-weight:500;font-size:21px;margin-bottom:8px;}
  #sheet p{font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;color:rgba(20,17,13,.65);}
  #sheet .row{display:flex;gap:10px;margin-top:18px;}
  #sheet button{flex:1;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;
    padding:14px;border-radius:3px;cursor:pointer;border:1px solid var(--ink);}
  #sheet .primary{background:var(--ink);color:var(--bone);}

  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<section id="landing">
  <div class="topline">
    <span class="eyebrow">Furniture AR</span>
    <span class="meta">Kolkata · Beta</span>
  </div>
  <div class="stage">
    <canvas id="preview"></canvas>
    <div class="stage-fade"></div>
    <div id="previewLoad"><div class="ring"></div><span>Loading model</span></div>
  </div>
  <div class="titleblock">
    <span class="eyebrow">L-Sectional</span>
    <h1>Dexter <em>Tufted</em><br>Sectional</h1>
    <div class="dims util">
      <span><b>2.67</b>m wide</span><span class="sep"></span>
      <span><b>2.03</b>m deep</span><span class="sep"></span>
      <span><b>0.94</b>m tall</span>
    </div>
  </div>
  <button class="enter" id="enterAR">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7.5 12 3l9 4.5v9L12 21l-9-4.5z"/><path d="M3 7.5 12 12l9-4.5M12 12v9"/>
    </svg>
    Place in your room
  </button>
  <p class="hint" id="hint">Point your phone at the floor to begin.</p>
</section>

<div id="ar-overlay">
  <div class="ar-top">
    <div class="readout">
      <div class="rk">Distance to sofa</div>
      <div class="rv" id="distVal">&mdash;<small>m</small></div>
      <div class="rsub" id="footVal">Footprint 2.67 &times; 2.03 m</div>
    </div>
    <button class="close" id="closeAR" aria-label="Exit AR">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
  </div>
  <div class="ar-bottom">
    <div class="reticle-hint" id="reticleHint">Move your phone slowly to find the floor</div>
    <button class="place-btn" id="placeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6m0 8v6M2 12h6m8 0h6"/><circle cx="12" cy="12" r="3"/></svg>
      Place here
    </button>
  </div>
</div>

<div id="sheet">
  <h3 id="sheetTitle">AR isn't available here</h3>
  <p id="sheetBody"></p>
  <div class="row"><button class="primary" id="sheetOk">Got it</button></div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const MODEL_URL = 'https://msarcasa.github.io/furniture-ar/dexter_optimised.glb';
const DIMS = { w: 2.67, d: 2.03, h: 0.94 };

const enterBtn=document.getElementById('enterAR');
const hint=document.getElementById('hint');
const overlay=document.getElementById('ar-overlay');
const closeBtn=document.getElementById('closeAR');
const placeBtn=document.getElementById('placeBtn');
const distVal=document.getElementById('distVal');
const footVal=document.getElementById('footVal');
const reticleHint=document.getElementById('reticleHint');
const previewLoad=document.getElementById('previewLoad');
const sheet=document.getElementById('sheet');
const sheetTitle=document.getElementById('sheetTitle');
const sheetBody=document.getElementById('sheetBody');
const sheetOk=document.getElementById('sheetOk');

const loader=new GLTFLoader();
let modelTemplate=null, modelLoadError=false;

loader.load(MODEL_URL,
  (gltf)=>{ modelTemplate=gltf.scene; buildPreview(gltf.scene.clone(true)); previewLoad.classList.add('gone'); },
  undefined,
  ()=>{ modelLoadError=true; previewLoad.classList.add('gone');
        showSheet('Model didn\u2019t load','We couldn\u2019t reach the 3D file. Check the connection and reload the page.'); }
);

function buildPreview(scene){
  const canvas=document.getElementById('preview');
  const r=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  r.setPixelRatio(Math.min(devicePixelRatio,2));
  const cam=new THREE.PerspectiveCamera(38,1,0.01,100);
  const world=new THREE.Scene();
  world.add(new THREE.HemisphereLight(0xffffff,0xb8a888,1.05));
  const key=new THREE.DirectionalLight(0xfff4e2,1.4); key.position.set(3,5,4); world.add(key);
  const rim=new THREE.DirectionalLight(0xcda35e,.5); rim.position.set(-4,2,-3); world.add(rim);
  const box=new THREE.Box3().setFromObject(scene);
  const c=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  scene.position.sub(c);
  const holder=new THREE.Group(); holder.add(scene); world.add(holder);
  const radius=Math.max(size.x,size.y,size.z);
  function resize(){
    const s=canvas.parentElement.getBoundingClientRect();
    r.setSize(s.width,s.height,false);
    cam.aspect=s.width/s.height; cam.updateProjectionMatrix();
  }
  resize(); addEventListener('resize',resize);
  cam.position.set(radius*0.9,radius*0.55,radius*1.5); cam.lookAt(0,0,0);
  let t=0;
  (function loop(){requestAnimationFrame(loop);t+=0.0045;holder.rotation.y=Math.sin(t)*0.55+0.5;r.render(world,cam);})();
}

async function arSupported(){
  if(!('xr' in navigator)) return false;
  try{ return await navigator.xr.isSessionSupported('immersive-ar'); }catch{ return false; }
}
(async function initButton(){
  const ok=await arSupported();
  if(!ok){
    enterBtn.addEventListener('click',()=>showSheet('AR isn\u2019t available here',
      'This phone or browser doesn\u2019t support in-room AR yet. On Android, open in Chrome and make sure \u201cGoogle Play Services for AR\u201d is installed. On iPhone, this experience needs a browser with WebXR.'));
    hint.innerHTML='Best on Android Chrome.';
  }else{
    enterBtn.addEventListener('click',startAR);
  }
})();

let session=null,gl=null,renderer=null,scene=null,camera=null;
let reticle=null,hitTestSource=null,viewerSpace=null,refSpace=null;
let placedSofa=null,footprintLine=null,ropeLine=null;
let sofaCenter=new THREE.Vector3();

async function startAR(){
  if(modelLoadError||!modelTemplate){ showSheet('Still loading','The model hasn\u2019t finished loading yet. Give it a second and tap again.'); return; }
  try{
    session=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['hit-test','local-floor'],
      optionalFeatures:['dom-overlay'],
      domOverlay:{root:overlay}
    });
  }catch(e){
    showSheet('Couldn\u2019t start AR','The camera permission may have been declined. Allow camera access and try again.');
    return;
  }
  overlay.classList.add('on');
  placeBtn.classList.add('hidden');
  distVal.innerHTML='&mdash;<small>m</small>';

  const canvas=document.createElement('canvas');
  gl=canvas.getContext('webgl',{xrCompatible:true,alpha:true});
  renderer=new THREE.WebGLRenderer({canvas,context:gl,alpha:true,antialias:true});
  renderer.autoClear=false; renderer.setPixelRatio(1);
  scene=new THREE.Scene();
  scene.add(new THREE.HemisphereLight(0xffffff,0x99846a,1.1));
  const dir=new THREE.DirectionalLight(0xffffff,1.0); dir.position.set(1,3,2); scene.add(dir);
  camera=new THREE.PerspectiveCamera();

  const rg=new THREE.RingGeometry(0.10,0.12,40).rotateX(-Math.PI/2);
  const rm=new THREE.MeshBasicMaterial({color:0xcda35e,transparent:true,opacity:0.9});
  reticle=new THREE.Mesh(rg,rm); reticle.matrixAutoUpdate=false; reticle.visible=false; scene.add(reticle);

  await renderer.xr.setSession(session);
  refSpace=await session.requestReferenceSpace('local-floor');
  viewerSpace=await session.requestReferenceSpace('viewer');
  hitTestSource=await session.requestHitTestSource({space:viewerSpace});
  session.addEventListener('end',cleanupAR);
  renderer.xr.setReferenceSpace(refSpace);
  renderer.setAnimationLoop(onXRFrame);
}

function placeSofa(){
  if(!reticle.visible) return;
  if(!placedSofa){
    placedSofa=modelTemplate.clone(true); scene.add(placedSofa);
    buildFootprint(); buildRope();
  }
  const pos=new THREE.Vector3().setFromMatrixPosition(new THREE.Matrix4().fromArray(reticle.matrix));
  placedSofa.position.copy(pos);
  footprintLine.position.copy(pos); footprintLine.position.y+=0.005;
  sofaCenter.copy(pos); sofaCenter.y+=DIMS.h/2;
  reticleHint.style.opacity='0';
  placeBtn.querySelector('svg').style.display='none';
  placeBtn.childNodes[2].nodeValue=' Move it';
}
placeBtn.addEventListener('click',placeSofa);

function buildFootprint(){
  const w=DIMS.w/2,d=DIMS.d/2;
  const pts=[new THREE.Vector3(-w,0,-d),new THREE.Vector3(w,0,-d),new THREE.Vector3(w,0,d),new THREE.Vector3(-w,0,d),new THREE.Vector3(-w,0,-d)];
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:0xcda35e,transparent:true,opacity:0.85});
  footprintLine=new THREE.Line(g,mat); scene.add(footprintLine);
}
function buildRope(){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),new THREE.Vector3()]);
  const mat=new THREE.LineBasicMaterial({color:0xf3efe6,transparent:true,opacity:0.45});
  ropeLine=new THREE.Line(g,mat); scene.add(ropeLine);
}

const tmpPos=new THREE.Vector3();
function onXRFrame(t,frame){
  const pose=frame.getViewerPose(refSpace);
  if(!pose){ renderer.render(scene,camera); return; }
  const hits=frame.getHitTestResults(hitTestSource);
  if(hits.length){
    const hitPose=hits[0].getPose(refSpace);
    reticle.visible=true; reticle.matrix.fromArray(hitPose.transform.matrix);
    if(placeBtn.classList.contains('hidden')){
      placeBtn.classList.remove('hidden');
      reticleHint.textContent=placedSofa?'Tap \u201cMove it\u201d to reposition':'Tap \u201cPlace here\u201d to drop the sofa';
    }
  }else{ reticle.visible=false; }

  const cp=pose.transform.position; tmpPos.set(cp.x,cp.y,cp.z);
  if(placedSofa&&ropeLine){
    const arr=ropeLine.geometry.attributes.position.array;
    arr[0]=tmpPos.x;arr[1]=tmpPos.y;arr[2]=tmpPos.z;
    arr[3]=sofaCenter.x;arr[4]=sofaCenter.y;arr[5]=sofaCenter.z;
    ropeLine.geometry.attributes.position.needsUpdate=true;
    const dist=tmpPos.distanceTo(sofaCenter);
    distVal.innerHTML=dist.toFixed(2)+'<small>m</small>';
    footVal.textContent=`Footprint ${DIMS.w.toFixed(2)} \u00d7 ${DIMS.d.toFixed(2)} m`;
  }
  renderer.render(scene,camera);
}

function cleanupAR(){
  overlay.classList.remove('on');
  if(renderer) renderer.setAnimationLoop(null);
  if(hitTestSource){ hitTestSource.cancel&&hitTestSource.cancel(); hitTestSource=null; }
  placedSofa=null; footprintLine=null; ropeLine=null;
  reticleHint.style.opacity='1'; reticleHint.textContent='Move your phone slowly to find the floor';
  placeBtn.classList.add('hidden');
  placeBtn.querySelector('svg').style.display='';
  placeBtn.childNodes[2].nodeValue=' Place here';
  session=null;
}
closeBtn.addEventListener('click',()=>{ if(session) session.end(); });

function showSheet(title,body){ sheetTitle.textContent=title; sheetBody.textContent=body; sheet.classList.add('up'); }
sheetOk.addEventListener('click',()=>sheet.classList.remove('up'));
</script>
</body>
</html>
